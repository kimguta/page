<div class="login-bx">
    <h4>로그인</h4>
    <div class="login-form">
        <form action="">
            <div class="input-bx">
                <label for="value-id">
                    <img src="/page/cccf/images/sub/ico-login.png" alt="로그인">
                </label>
                <input type="text" name="" id="value-id" placeholder="아이디를 입력하세요">
            </div>
            <div class="input-bx">
                <label for="value-pass">
                    <img src="/page/cccf/images/sub/ico-pw.png" alt="비밀번호">
                </label>
                <input type="password" name="" id="value-pass" placeholder="비밀번호를 입력하세요">
            </div>
            <div class="save-bx">
                <input type="checkbox" name="" id="save">
                <label for="save">아이디 저장</label>
            </div>
            <button type="button">로그인</button>
            <div class="btn-bx">
                <a href="#">아이디 / 비밀번호 찾기</a>
                <a href="#">회원가입</a>
            </div>
        </form>
    </div>
</div>
